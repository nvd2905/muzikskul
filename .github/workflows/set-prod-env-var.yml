name: Set Production Env Var (one-off)

# Manual-only utility: upserts YOUTUBE_API_KEY into
# /var/www/muzikskul/.env.production.local on the VPS over SSH, reusing the
# same SSH_* secrets as deploy.yml. Prod secrets never go in git — see
# docs/DEPLOYMENT.md ("No Supabase/app secrets go in GitHub — they live only
# in .env.production.local on the VPS"). The value itself is stored as the
# YOUTUBE_API_KEY_VALUE repo secret so it's never readable back out and is
# masked in logs the same way SSH_PRIVATE_KEY already is.

on:
  workflow_dispatch: {}

jobs:
  set-env:
    runs-on: ubuntu-latest
    steps:
      - name: Upsert YOUTUBE_API_KEY on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -euo pipefail
            ENV_FILE=/var/www/muzikskul/.env.production.local
            sed -i '/^YOUTUBE_API_KEY=/d' "$ENV_FILE"
            echo "YOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY_VALUE }}" >> "$ENV_FILE"
            echo "YOUTUBE_API_KEY updated in $ENV_FILE"
