name: Set Production DB Env Vars (one-off)

# Manual-only utility: upserts DATABASE_URL and DIRECT_URL into
# /var/www/muzikskul/.env.production.local on the VPS over SSH, reusing the
# same SSH_* secrets as deploy.yml. Values live in the DATABASE_URL_VALUE /
# DIRECT_URL_VALUE repo secrets so they're never readable back out and are
# masked in logs the same way SSH_PRIVATE_KEY already is. See
# set-prod-env-var.yml for the same pattern applied to YOUTUBE_API_KEY.

on:
  workflow_dispatch: {}

jobs:
  set-env:
    runs-on: ubuntu-latest
    steps:
      - name: Upsert DATABASE_URL / DIRECT_URL on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -euo pipefail
            ENV_FILE=/var/www/muzikskul/.env.production.local
            sed -i '/^DATABASE_URL=/d' "$ENV_FILE"
            sed -i '/^DIRECT_URL=/d' "$ENV_FILE"
            echo "DATABASE_URL=${{ secrets.DATABASE_URL_VALUE }}" >> "$ENV_FILE"
            echo "DIRECT_URL=${{ secrets.DIRECT_URL_VALUE }}" >> "$ENV_FILE"
            echo "DATABASE_URL and DIRECT_URL updated in $ENV_FILE"
