name: Diagnose Production (one-off, read-only)

# Manual-dispatch-only diagnostic: reports whether required muzik env vars are
# present (counts only, never values), what PM2 is actually running, and
# recent app logs. Makes no changes.

on:
  workflow_dispatch: {}

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect env + PM2 + recent logs
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -euo pipefail
            ENV_FILE=/var/www/muzikskul/.env.production.local
            echo "=== env var presence (counts only, no values) ==="
            for var in DATABASE_URL DIRECT_URL NEXT_PUBLIC_SUPABASE_URL NEXT_PUBLIC_SUPABASE_ANON_KEY WALLET_ENCRYPTION_KEY YOUTUBE_API_KEY; do
              count=$(grep -c "^${var}=" "$ENV_FILE" || true)
              echo "$var: $count"
            done
            echo "=== DATABASE_URL as @next/env would load it (redacted middle) ==="
            cd /var/www/muzikskul
            node -e "
              const { loadEnvConfig } = require('@next/env');
              loadEnvConfig(process.cwd(), false);
              const v = process.env.DATABASE_URL || '';
              console.log(v ? v.slice(0, 35) + '...REDACTED...' + v.slice(-25) : 'MISSING');
              console.log('length:', v.length);
              const yt = process.env.YOUTUBE_API_KEY || '';
              console.log('YOUTUBE_API_KEY:', yt ? yt.slice(0, 8) + '...REDACTED...' + yt.slice(-4) : 'MISSING', 'length:', yt.length);
            "
            echo "=== live search.list call from THIS VPS (URL not printed, key never echoed by Google) ==="
            node -e "
              const { loadEnvConfig } = require('@next/env');
              loadEnvConfig(process.cwd(), false);
              const key = process.env.YOUTUBE_API_KEY;
              fetch('https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=1&q=test&key=' + encodeURIComponent(key))
                .then(async r => { console.log('status:', r.status); console.log(await r.text()); })
                .catch(e => console.log('fetch error:', e.message));
            "
            echo "=== outbound IP this VPS uses to reach the internet ==="
            curl -s https://api.ipify.org || true
            echo "=== pm2 describe muzikskul ==="
            pm2 describe muzikskul || true
            echo "=== pm2 logs (last 80 lines) ==="
            pm2 logs muzikskul --lines 80 --nostream || true
